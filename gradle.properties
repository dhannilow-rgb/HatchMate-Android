# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from command line, check
# build.gradle files instead.
org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m

# Enable the configuration on demand feature
org.gradle.configureondemand=true

# Enable parallel build
org.gradle.parallel=true

# Kotlin compiler
kotlin.code.style=official
kotlin.incremental=true

# Android Gradle Plugin
android.useAndroidX=true
android.enableJetifier=true
android.gradle.experimental.enableSourceSetPathsMap=true
